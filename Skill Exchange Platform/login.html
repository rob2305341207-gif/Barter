<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Barter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><i class="fas fa-exchange-alt"></i> Barter</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span class="burger"></span>
      </button>
      <nav class="nav" id="mainNav">
        <ul class="nav-list">
          <li><a class="nav-link home-btn" href="index.html">Home</a></li>
          <li><a class="nav-link login-btn" href="login.html">Login</a></li>
          <li><a class="nav-link register-btn" href="register.html">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <section class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title"><i class="fas fa-sign-in-alt" style="color:var(--neon);"></i> Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue your skill exchange journey</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="you@university.edu" required>
            <div class="form-error" id="emailError">Please enter a valid email</div>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required minlength="6">
            <div class="form-error" id="passwordError">Password must be at least 6 characters</div>
          </div>
          
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <label style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:0.9rem;cursor:pointer;">
              <input type="checkbox" id="rememberMe" style="accent-color:var(--neon);">
              Remember me
            </label>
            <a href="#" style="color:var(--neon);font-size:0.9rem;text-decoration:none;">Forgot password?</a>
          </div>
          
          <button type="submit" class="cta-primary" style="width:100%;padding:14px;">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
        </form>
        
        <div class="auth-links">
          <p>Don't have an account? <a href="register.html">Create one now</a></p>
          <p style="margin-top:8px;font-size:0.9rem;">Or continue with</p>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:12px;">
            <button type="button" class="cta-ghost" style="flex:1;"><i class="fab fa-google"></i> Google</button>
            <button type="button" class="cta-ghost" style="flex:1;"><i class="fab fa-github"></i> GitHub</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Barter — Skill Exchange Platform</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    // Mobile nav toggle
    const navToggle = document.getElementById('navToggle');
    const mainNav = document.getElementById('mainNav');
    navToggle.addEventListener('click', () => {
      mainNav.classList.toggle('open');
    });

    // Form validation
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const result = await authManager.login(email, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        alert(result.message || 'Login failed');
      }
    });
  </script>
</body>
</html>
